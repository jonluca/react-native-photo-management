plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.reactnativephotomanagement'
version = 'unspecified'

android {
  namespace "expo.modules.reactnativephotomanagement"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

dependencies {
  implementation "com.google.mlkit:image-labeling:17.0.9"
}
